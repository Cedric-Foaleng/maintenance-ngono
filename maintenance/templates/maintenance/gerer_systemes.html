<!DOCTYPE html>
<html>
<head>
    <title>Gestion Systèmes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">
    <div class="container">
        <h1 class="text-center mb-4">⚙️ Gestion Systèmes & Composants</h1>
        <a href="{% url 'tableau_de_bord' %}" class="btn btn-secondary mb-3">← Tableau de bord</a>
        
        <!-- FORM SYSTEME -->
        <div class="card mb-4">
            <div class="card-body">
                <form method="post" class="row g-3">
                    {% csrf_token %}
                    <input type="hidden" name="action" value="creer_systeme">
                    <div class="col-md-4">
                        <input type="text" name="nom_systeme" class="form-control" placeholder="ex: Moteur" required>
                    </div>
                    <div class="col-md-2">
                        <input type="text" name="icone_systeme" class="form-control" placeholder="⚙️" maxlength="5">
                    </div>
                    <div class="col-md-4">
                        <input type="text" name="desc_systeme" class="form-control" placeholder="Description">
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-success w-100">➕ Créer</button>
                    </div>
                </form>
            </div>
        </div>
        
        <!-- LISTE SYSTEMES -->
        <h3>Systèmes ({{ systemes.count }})</h3>
        {% for systeme in systemes %}
        <div class="card mb-2">
            <div class="card-body d-flex justify-content-between">
                <span>{{ systeme.icone }} {{ systeme.nom }}</span>
                <form method="post" class="d-inline" onsubmit="return confirm('Supprimer ?')">
                    {% csrf_token %}
                    <input type="hidden" name="action" value="supprimer_systeme">
                    <input type="hidden" name="systeme_id" value="{{ systeme.id }}">
                    <button type="submit" class="btn btn-danger btn-sm">🗑️</button>
                </form>
            </div>
        </div>
        {% empty %}
        <p>Aucun système. Créez-en un !</p>
        {% endfor %}
    </div>
</body>
</html>
